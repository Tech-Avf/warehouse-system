<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Slip</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.box {
  border: 1px solid #000;
  padding: 15px;
}

.header {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #000;
  padding: 6px;
  text-align: left;
}

.sign {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
}

.sign div {
  text-align: center;
  width: 30%;
}

@media print {
  button { display: none; }
}
.page {
  width: 210mm;
  min-height: 297mm;
  padding: 20px;
  background: white;
  font-family: Arial;
}

.info p {
  margin: 4px 0;
}

table {
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  padding: 6px;
  text-align: left;
}

.sign {
  display: flex;
  justify-content: space-between;
  margin-top: 60px;
  text-align: center;
}
.print-header {

  display: flex;

  align-items: center;

  justify-content: center;

  gap: 20px;

  margin-bottom: 20px;

}

.print-logo {

  width: 200px;

  height: auto;

}
</style>
</head>

<body>

<div class="page">

  <div class="print-header">

  <img
    src="https://lh3.googleusercontent.com/d/1tVh2e4ZDiraIXAGAT54VkAhYsKi5xgCl"
    class="print-logo"
    alt="Logo">

  <div>

    <h2>
      GOODS RETURN SLIP
    </h2>

    <p>
      (Phiếu trả công cụ)
    </p>

  </div>

</div>

  <div class="info">
    <p><b>Slip No:</b> <span id="slipNo"></span></p>
    <p><b>Product Code:</b> <span id="productCode"></span></p>
    <p><b>Machine No:</b> <span id="machineNo"></span></p>
    <p><b>Creator:</b> <span id="creator"></span></p>
    <p><b>Returner:</b> <span id="returner"></span></p>
    <p><b>Note:</b> <span id="note"></span></p>
  </div>

  <hr>

  <h3>Tool List</h3>

  <table border="1" width="100%" cellspacing="0">
    <thead>
      <tr>
        <th>No</th>
        <th>Tool Name</th>
        <th>Qty</th>
      </tr>
    </thead>

    <tbody id="toolBody"></tbody>
  </table>

  <br><br>

  <div class="sign">
    <div>
      <p>Receiver</p>
      <br><br>
      <p>__________________</p>
    </div>

    <div>
      <p>Returner</p>
      <br><br>
      <p>__________________</p>
    </div>



</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbziRJr00wL7L1ClaJz92zx1dlHOp_0nS_wUic_rhEtrWJnA-If4ivIpXmJo5AgtF7dOIg/exec";

const params = new URLSearchParams(window.location.search);
const slipNo = params.get("slipNo");

if (!slipNo) {
  alert("Missing slipNo");
}

fetch(API + "?action=slip_detail&slipNo=" + slipNo)
  .then(res => res.json())
.then(slip => {

  if (!slip) {
    alert("Không tìm thấy phiếu");
    return;
  }

  document.getElementById("slipNo").innerText = slip.slipNo;
  document.getElementById("productCode").innerText = slip.productCode;
  document.getElementById("machineNo").innerText = slip.machineNo;
  document.getElementById("creator").innerText = slip.creator;
  document.getElementById("returner").innerText = slip.returner;
  document.getElementById("note").innerText = slip.note;

  return fetch(API + "?slipNo=" + slip.slipNo);
})
  .then(res => res.json())
  .then(tools => {

    console.log("TOOLS:", tools);

    let html = "";

    tools.forEach((t, i) => {
      html += `
        <tr>
          <td>${i + 1}</td>
          <td>${t.tool}</td>
          <td>${t.qty}</td>
        </tr>
      `;
    });

    document.getElementById("toolBody").innerHTML = html;

  })
  .catch(err => {
    console.error(err);
    alert("Error loading data");
  });

</script>

</body>
</html>
