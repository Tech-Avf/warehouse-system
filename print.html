<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Slip</title>
<link rel="icon"
      type="image/png"
      href="favicon.png">
<style>
/* Reset & Cấu hình chung cho trang in */
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: #f0f2f5;
  color: #333;
}

/* Khung trang chuẩn kích thước A4 dọc */
.page {
  width: 210mm;
  min-height: 297mm;
  padding: 20mm;
  margin: 20px auto;
  background: white;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

/* Header phối hợp Logo và Tiêu đề */
.print-header {
  display: grid;
  grid-template-columns: 150px 1fr;
  align-items: center;
  border-bottom: 2px solid #1e3a8a;
  padding-bottom: 15px;
  margin-bottom: 25px;
}

.print-logo {
  max-width: 100%;
  height: auto;
  object-fit: contain;
}

.title-box {
  text-align: center;
  padding-right: 50px; /* Cân bằng lại khoảng trống do logo chiếm dụng */
}

.title-box h1 {
  margin: 0;
  font-size: 26px;
  color: #1e3a8a;
  letter-spacing: 0.5px;
}

.title-box p {
  margin: 5px 0 0 0;
  font-size: 14px;
  color: #555;
  font-style: italic;
}

/* Bảng thông tin (Info Box) dạng Grid cân đối */
.info-box {
  display: grid;
  grid-template-columns: 1fr 1fr;
  margin-bottom: 25px;
  border-top: 1px solid #cfd8e3;
  border-left: 1px solid #cfd8e3;
}

.info-item {
  padding: 10px 12px;
  border-right: 1px solid #cfd8e3;
  border-bottom: 1px solid #cfd8e3;
  background: white;
}

.info-item label {
  display: block;
  font-size: 11px;
  font-weight: bold;
  color: #1e3a8a;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.info-item span {
  font-weight: 600;
  color: #111;
  font-size: 14px;
}

.full-width {
  grid-column: 1 / 3;
}

/* Tiêu đề bảng Tool List */
.table-title {
  background: #1e3a8a;
  color: white;
  padding: 10px 15px;
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  margin-top: 15px;
}

.table-title span {
  font-weight: normal;
  font-size: 13px;
  margin-left: 5px;
  font-style: italic;
}

/* Cấu trúc Table */
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 40px;
}

th, td {
  border: 1px solid #cfd8e3;
  padding: 10px 12px;
  text-align: left;
  font-size: 14px;
}

thead {
  background: #f0f4f8;
  color: #1e3a8a;
}

th {
  font-weight: bold;
  text-align: center;
}

/* Tối ưu kích thước cột */
th:first-child, td:first-child {
  width: 80px;
  text-align: center;
}

th:last-child, td:last-child {
  width: 120px;
  text-align: center;
}

tbody tr:nth-child(even) {
  background: #fcfdfe;
}

/* Khu vực chữ ký */
.sign {
  display: flex;
  justify-content: space-around;
  margin-top: 50px;
  text-align: center;
  page-break-inside: avoid; /* Tránh bị cắt đôi khi in */
}

.sign strong {
  font-size: 15px;
  color: #111;
}

.sign span {
  font-size: 12px;
  color: #666;
  font-style: italic;
}

.signature-line {
  width: 180px;
  border-bottom: 1px dashed #999;
  margin: 70px auto 0;
}

/* Cấu hình khi bấm IN (Ctrl + P) */
@media print {
  body {
    background: white;
  }
  .page {
    width: 100%;
    min-height: auto;
    margin: 0;
    padding: 0;
    box-shadow: none;
  }
  button { 
    display: none; 
  }
}

@page {
  size: A4;
  margin: 15mm;
}
</style>
</head>

<body>

<div class="page">

  <div class="print-header">
    <img src="https://lh3.googleusercontent.com/d/1tVh2e4ZDiraIXAGAT54VkAhYsKi5xgCl" class="print-logo" alt="Logo">
    <div class="title-box">
      <h1>GOODS RETURN SLIP</h1>
      <p>(PHIẾU TRẢ CÔNG CỤ)</p>
    </div>
  </div>

  <div class="info-box">
    <div class="info-item">
      <label>Slip No / Mã phiếu</label>
      <span id="slipNo"></span>
    </div>
    <div class="info-item">
      <label>Date / Ngày</label>
      <span id="date"></span>
    </div>
    <div class="info-item">
      <label>Product Code / Mã hàng</label>
      <span id="productCode"></span>
    </div>
    <div class="info-item">
      <label>Machine No / Máy</label>
      <span id="machineNo"></span>
    </div>
    <div class="info-item">
      <label>Creator / Người tạo</label>
      <span id="creator"></span>
    </div>
    <div class="info-item">
      <label>Returner / Người trả</label>
      <span id="returner"></span>
    </div>
    <div class="info-item full-width">
      <label>Note / Ghi chú</label>
      <span id="note"></span>
    </div>
  </div>

  <div class="table-title">
    TOOL LIST <span>(DANH SÁCH CÔNG CỤ)</span>
  </div>

  <div class="tool-wrapper">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Tool Name</th>
          <th>Qty</th>
        </tr>
      </thead>
      <tbody id="toolBody">
        </tbody>
    </table>
  </div>

  <div class="sign">
    <div>
      <strong>Receiver</strong><br>
      <span>(Người nhận)</span>
      <div class="signature-line"></div>
    </div>
    <div>
      <strong>Returner</strong><br>
      <span>(Người trả)</span>
      <div class="signature-line"></div>
    </div>
  </div>

</div> <script>
const API = "https://script.google.com/macros/s/AKfycbziRJr00wL7L1ClaJz92zx1dlHOp_0nS_wUic_rhEtrWJnA-If4ivIpXmJo5AgtF7dOIg/exec";
const params = new URLSearchParams(window.location.search);
const slipNo = params.get("slipNo");

if (!slipNo) {
  alert("Missing slipNo");
}

fetch(API + "?action=slip_detail&slipNo=" + slipNo)
  .then(res => res.json())
  .then(slip => {
    if (!slip) {
      alert("Không tìm thấy phiếu");
      return;
    }
    document.getElementById("slipNo").innerText = slip.slipNo;
    document.getElementById("productCode").innerText = slip.productCode;
    document.getElementById("machineNo").innerText = slip.machineNo;
    document.getElementById("creator").innerText = slip.creator;
    document.getElementById("returner").innerText = slip.returner;
    document.getElementById("note").innerText = slip.note;
    
    const date = new Date(slip.date);
    document.getElementById("date").innerText = date.toLocaleDateString("vi-VN");
    
    return fetch(API + "?slipNo=" + slip.slipNo);
  })
  .then(res => res.json())
  .then(tools => {
    console.log("TOOLS:", tools);
    let html = "";
    tools.forEach((t, i) => {
      html += `
        <tr>
          <td style="text-align: center;">${i + 1}</td>
          <td>${t.tool}</td>
          <td style="text-align: center; font-weight: bold;">${t.qty}</td>
        </tr>
      `;
    });
    document.getElementById("toolBody").innerHTML = html;
  })
  .catch(err => {
    console.error(err);
    alert("Error loading data");
  });
</script>

</body>
</html>
