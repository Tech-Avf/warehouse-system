<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
      content="width=device-width, initial-scale=1.0">
  <title>Create Slip - Nhập kho</title>

  <style>
    body { font-family: Arial; margin: 20px; }

    input { padding: 6px; margin: 4px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    button {
      padding: 6px 10px;
      margin-top: 10px;
      cursor: pointer;
    }
    body {
  font-family: Arial;
  margin: 20px;
  background: #f6f7fb;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

th {
  background: #2f3542;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

input {
  width: 95%;
  padding: 6px;
  border: 1px solid #ddd;
  border-radius: 4px;
}

button {
  background: #3742fa;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
}

button:hover {
  background: #2f3542;
}
.page-header{
  background:white;
  padding:20px;
  margin:-20px -20px 20px -20px;

  box-shadow:
  0 2px 10px rgba(0,0,0,.08);
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-wrap img{
  width:70px;
}

.logo-wrap h1{
  margin:0;
  color:#1e3a8a;
}

.logo-wrap span{
  color:#666;
}

.card{
  background:white;

  border-radius:12px;

  padding:20px;

  margin-bottom:20px;

  box-shadow:
  0 4px 12px rgba(0,0,0,.08);
}

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(250px,1fr));

  gap:15px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field label{
  margin-bottom:6px;
  font-weight:600;
}

.field input{
  width:auto;
}

.save-btn{

  background:#2563eb;

  color:white;

  border:none;

  padding:14px 28px;

  font-size:16px;

  font-weight:600;

  border-radius:10px;
}

.save-btn:hover{
  background:#1d4ed8;
}
#slipNo{
  background:#f1f5f9;
  color:#64748b;
  cursor:not-allowed;
}
textarea{

  width:100%;

  min-height:120px;

  padding:10px;

  border:1px solid #ddd;

  border-radius:8px;

  resize:vertical;

  box-sizing:border-box;

  font-family:inherit;

  font-size:14px;
}
.note-field{
  grid-column:1 / -1;
}
  </style>
</head>

<body>

<div class="page-header">

  <div class="logo-wrap">

    <img
      src="https://lh3.googleusercontent.com/d/1tVh2e4ZDiraIXAGAT54VkAhYsKi5xgCl">

    <div>

      <h1>
        WAREHOUSE MANAGEMENT SYSTEM
      </h1>

      <span>
        Create Goods Receipt
        (Tạo phiếu nhập kho)
      </span>

    </div>

  </div>

</div>

<div class="card">

<h3>
Slip Information
</h3>

<div class="form-grid">
  <div class="field">
<label>
SlipNo / Mã phiếu
</label>
<input
  id="slipNo"
  readonly>  
</div>

<div class="field">
<label>
Product Code / Mã sản phẩm
</label>
<input id="productCode">
</div>

<div class="field">
<label>
Machine No / Số máy
</label>
<input id="machineNo">
</div>

<div class="field">
<label>
Creator / Người tạo
</label>
<input id="creator">
</div>

<div class="field">
<label>
Returner / Người trả
</label>
<input id="returner">
</div>

<div class="field note-field">

<label>
Note / Ghi chú
</label>

<textarea
  id="note"
  placeholder="Nhập ghi chú...">
</textarea>

</div>

</div>

</div>

<!-- ================= TOOL LIST ================= -->
<div class="card">
<h3>Tool List / Danh sách công cụ</h3>
</div>

<table id="toolTable">
  <thead>
    <tr>
      <th style="width:60px;">No.</th>
      <th>Tool Name</th>
      <th style="width:120px;">Quantity</th>
      <th style="width:80px;">Action</th>
    </tr>
  </thead>

  <tbody></tbody>
</table>

<button onclick="addRow()">+ Add Tool</button>

  <tbody></tbody>
<br>

<!-- ================= ACTION ================= -->
<button
  class="save-btn"
  onclick="saveDraft()">

  Save Slip

</button>

<script>
// ================= SLIP NO =================
function generateSlipNo() {
  const now = new Date();

  const id =
    "SLIP-" +
    now.getFullYear() +
    (now.getMonth() + 1).toString().padStart(2, '0') +
    now.getDate().toString().padStart(2, '0') + "-" +
    Math.floor(Math.random() * 1000);

  document.getElementById("slipNo").value = id;
}

// ================= ADD TOOL ROW =================
function addRow() {
  const table = document.querySelector("#toolTable tbody");

  const row = document.createElement("tr");

  row.innerHTML = `
    <td class="no"></td>
    <td><input placeholder="Tool Name"></td>
    <td><input type="number" value="1" min="1"></td>
    <td><button onclick="removeRow(this)">X</button></td>
  `;

  table.appendChild(row);

  updateRowNumber();
}
function updateRowNumber() {
  document.querySelectorAll("#toolTable tbody tr").forEach((tr, index) => {
    tr.querySelector(".no").innerText = index + 1;
  });
}
// ================= REMOVE ROW =================
function removeRow(btn) {
  btn.parentElement.parentElement.remove();
  updateRowNumber();
}

// ================= SAVE DRAFT =================
function saveDraft() {

  const data = {
    slipNo: document.getElementById("slipNo").value,
    productCode: document.getElementById("productCode").value,
    machineNo: document.getElementById("machineNo").value,
    creator: document.getElementById("creator").value,
    returner: document.getElementById("returner").value,
    note: document.getElementById("note").value,
    tools: []
  };

  document.querySelectorAll("#toolTable tbody tr").forEach(tr => {
    const inputs = tr.querySelectorAll("input");

    const toolName = inputs[0].value.trim();
    const quantity = inputs[1].value;

    if (toolName === "") return;

    data.tools.push({
      toolName,
      quantity: quantity || 1
    });
  });

  fetch("https://script.google.com/macros/s/AKfycbziRJr00wL7L1ClaJz92zx1dlHOp_0nS_wUic_rhEtrWJnA-If4ivIpXmJo5AgtF7dOIg/exec", {
  method: "POST",
  mode: "no-cors",
  body: JSON.stringify(data)
});

alert("Saving...");

setTimeout(() => {

  alert("Saved Successfully");

  window.location.href = "index.html";

}, 1500);
}

// ================= INIT =================
window.onload = function () {
  generateSlipNo();

  // tạo sẵn 10 dòng tool
  for (let i = 0; i < 10; i++) {
    addRow();
  }
};
</script>

</body>
</html>
