<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Approve Dashboard</title>
<link rel="icon"
      type="image/png"
      href="favicon.png">
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f7fb;
}

.page-header{
  background:white;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-wrap img{
  width:70px;
}

.logo-wrap h1{
  margin:0;
  color:#1e3a8a;
  font-size:28px;
}

.logo-wrap span{
  color:#666;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.summary{
  margin-bottom:20px;
}

.summary-card{
  background:white;
  padding:15px 20px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  font-size:18px;
  font-weight:600;
}

.card{
  background:white;
  border-radius:12px;
  padding:18px;
  margin-bottom:15px;

  box-shadow:
  0 4px 12px rgba(0,0,0,.08);

  transition:.25s;
}

.card:hover{
  transform:translateY(-2px);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.slip-no{
  font-size:20px;
  font-weight:700;
  color:#2563eb;
}

.info-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn:hover{
  background:#1d4ed8;
}

#pagination{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:25px;
}

.page-btn{
  width:40px;
  height:40px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.page-btn.active{
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>

<div class="page-header">

  <div class="logo-wrap">

    <img
      src="https://lh3.googleusercontent.com/d/1tVh2e4ZDiraIXAGAT54VkAhYsKi5xgCl"
      alt="logo">

    <div>

      <h1>
        WAREHOUSE MANAGEMENT SYSTEM
      </h1>

      <span>
        Review Inward Sliplist
        (Xem lại phiếu nhập kho)
      </span>

    </div>

  </div>

</div>

<div class="container">

  <div class="summary">

    <div class="summary-card">

      Total Slips:
      <span id="totalCount">0</span>

    </div>

  </div>

  <div id="list"></div>

  <div id="pagination"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbziRJr00wL7L1ClaJz92zx1dlHOp_0nS_wUic_rhEtrWJnA-If4ivIpXmJo5AgtF7dOIg/exec";
let allData = [];

const pageSize = 5;
let currentPage = 1;
      
function loadData() {

  fetch(API + "?action=latest_slips")
  .then(res => res.json())
  .then(data => {

  allData = data
    .sort((a,b)=>
      new Date(b.date) - new Date(a.date)
    )
    .slice(0,20);

  document.getElementById("totalCount")
          .innerText = allData.length;

  renderPage(1);

  renderPagination();

});
        <div class="card">

          <div class="info">

            <div class="field">
              <div class="label">Slip No (Mã phiếu)</div>
              <div class="value">${item.slipNo}</div>
            </div>

            <div class="field">
              <div class="label">Product Code (Mã SP)</div>
              <div class="value">${item.productCode}</div>
            </div>

            <div class="field">
              <div class="label">Machine (Máy)</div>
              <div class="value">${item.machineNo}</div>
            </div>

            <div class="field">
              <div class="label">Creator (Người tạo)</div>
              <div class="value">${item.creator}</div>
            </div>

            <div class="field">
              <div class="label">Returner (Người trả)</div>
              <div class="value">${item.returner}</div>
            </div>

            <div class="field">
              <div class="label">Date (Ngày)</div>
              <div class="value">${item.date || ""}</div>
            </div>

          </div>

          <button class="btn" onclick="viewSlip('${item.slipNo}')">
            View / Print (Xem / In)
          </button>

        </div>
      `;

    });

    document.getElementById("list").innerHTML = html;

  });

}
function renderPage(page){

  currentPage = page;

  const start =
      (page - 1) * pageSize;

  const end =
      start + pageSize;

  const items =
      allData.slice(start,end);

  let html = "";

  items.forEach(item=>{

    html += `

      <div class="card">

        <div class="card-top">

          <div class="slip-no">
            ${item.slipNo}
          </div>

          <button
            class="btn"
            onclick="viewSlip('${item.slipNo}')">

            Print
          </button>

        </div>

        <div class="info-grid">

          <div>
            <b>Product Code</b><br>
            ${item.productCode}
          </div>

          <div>
            <b>Machine</b><br>
            ${item.machineNo}
          </div>

          <div>
            <b>Creator</b><br>
            ${item.creator}
          </div>

          <div>
            <b>Returner</b><br>
            ${item.returner}
          </div>

          <div>
            <b>Date</b><br>
            ${item.date || ""}
          </div>

        </div>

      </div>

    `;
  });

  document.getElementById("list")
          .innerHTML = html;
}
function renderPagination(){

  const totalPages =
      Math.ceil(allData.length/pageSize);

  let html = "";

  html += `
  <button
    class="page-btn"
    onclick="changePage(${currentPage-1})">

    ◀

  </button>
  `;

  for(let i=1;i<=totalPages;i++){

    html += `
    <button
      class="page-btn
      ${i===currentPage?'active':''}"

      onclick="changePage(${i})">

      ${i}

    </button>
    `;
  }

  html += `
  <button
    class="page-btn"
    onclick="changePage(${currentPage+1})">

    ▶

  </button>
  `;

  document.getElementById("pagination")
          .innerHTML = html;
}
function changePage(page){

  const totalPages =
    Math.ceil(allData.length/pageSize);

  if(page < 1) return;

  if(page > totalPages) return;

  renderPage(page);

  renderPagination();

  window.scrollTo({
    top:0,
    behavior:'smooth'
  });

}
function viewSlip(slipNo) {
  window.open("print.html?slipNo=" + slipNo, "_blank");
}

loadData();

</script>

</body>
</html>
